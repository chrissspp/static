<script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@latest/dist/scramjet.codecs.js"></script>
<script>
    // 1. Define Config globally
    window.__scramjet$config = {
        prefix: '/service/',
        codec: 'xor',
        bare: 'https://bare.duckdns.org/',
        encodeUrl: (str) => {
            if (!str) return str;
            return encodeURIComponent(str.split('').map((char, i) => i % 2 ? String.fromCharCode(char.charCodeAt(0) ^ 2) : char).join(''));
        }
    };

    // 2. Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js', { 
            scope: '/service/' 
        }).then(() => console.log("Static Engine: Online"));
    }

    // 3. Typewriter (Wait for DOM to be ready)
    window.addEventListener('DOMContentLoaded', () => {
        const typewriter = document.getElementById('typewriter');
        const phrase = "welcome to static.";
        let charIdx = 0;

        function type() {
            if (charIdx < phrase.length) {
                const span = document.createElement('span');
                if (charIdx >= 11) span.className = 'rainbow';
                span.textContent = phrase[charIdx];
                typewriter.appendChild(span);
                charIdx++;
                setTimeout(type, 100);
            }
        }
        type();
    });

    // 4. Proxy Logic
    document.getElementById('proxy-form').onsubmit = (e) => {
        e.preventDefault();
        const val = document.getElementById('url-input').value.trim();
        if (!val) return;

        // Auto-search if not a URL
        let target = val.includes('.') ? (val.startsWith('http') ? val : 'https://' + val) : 'https://www.google.com/search?q=' + encodeURIComponent(val);
        
        document.getElementById('game-overlay').style.display = 'block';
        document.getElementById('game-frame').src = window.__scramjet$config.prefix + window.__scramjet$config.encodeUrl(target);
    };

    function closeGame() {
        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('game-frame').src = '';
    }
</script>
