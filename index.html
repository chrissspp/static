<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --primary-glow: #7c3aed;
            --secondary-glow: #c026d3;
            --text-main: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        #typewriter {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        /* Game Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-glow);
            box-shadow: 0 0 25px rgba(124, 58, 237, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .game-card img {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .game-card h3 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* Launch Button Glower */
        .btn-launch {
            margin-top: 15px;
            background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow));
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(192, 38, 211, 0.4);
        }

        /* Fullscreen Overlay */
        #game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .exit-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            z-index: 10001;
            transition: 0.3s;
        }

        .exit-btn:hover { background: #ef4444; }
    </style>
</head>
<body>

    <div class="hero">
        <h1 id="typewriter"></h1>
        <div class="subtitle">UNBLOCK YOUR JOURNEY TODAY</div>
    </div>

    <div class="dashboard-grid">
        <div class="game-card" onclick="launchGame('https://example-game-1.com')">
            <img src="./imgs/game1-icon.png" alt="Game">
            <h3>Retro Snake</h3>
            <button class="btn-launch">PLAY NOW</button>
        </div>

        <div class="game-card" onclick="launchGame('https://example-game-2.com')">
            <img src="./imgs/game2-icon.png" alt="Game">
            <h3>Drive Mad</h3>
            <button class="btn-launch">PLAY NOW</button>
        </div>
        
        </div>

    <div id="game-overlay">
        <iframe id="game-frame"></iframe>
        <button class="exit-btn" onclick="closeGame()">EXIT SESSION</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@latest/dist/scramjet.codecs.js"></script>
    <script>
        // Scramjet Configuration
        window.__scramjet$config = {
            prefix: '/service/',
            codec: 'xor',
            encodeUrl: (str) => {
                if (!str) return str;
                return encodeURIComponent(str.split('').map((char, i) => i % 2 ? String.fromCharCode(char.charCodeAt(0) ^ 2) : char).join(''));
            }
        };

        // Initialize Typewriter
        window.addEventListener('DOMContentLoaded', () => {
            const typewriter = document.getElementById('typewriter');
            const phrase = "welcome to static.";
            let i = 0;
            function type() {
                if (i < phrase.length) {
                    typewriter.textContent += phrase[i];
                    i++;
                    setTimeout(type, 100);
                }
            }
            type();
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js', { scope: '/service/' });
            }
        });

        function launchGame(url) {
            const encoded = window.__scramjet$config.prefix + window.__scramjet$config.encodeUrl(url);
            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('game-frame').src = encoded;
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
