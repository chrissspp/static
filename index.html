<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Static Hub</title>
    <style>
        :root {
            --accent: #a020f0; 
            --bg-deep: #000000; /* Pure black to hide gaps */
            --card-bg: #0f0f0f;
            --text: #ffffff;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-deep);
            color: var(--text);
            margin: 0;
            overflow: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 1.5rem;
            background: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.8rem; font-weight: bold; color: var(--accent); letter-spacing: 5px; }

        .nav-links button {
            background: none;
            border: none;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
        }

        .nav-links button.active { color: var(--accent); }

        /* --- PAGES --- */
        .page { display: none; padding: 40px 5%; height: 100vh; overflow-y: auto; }
        .page.active { display: block; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            text-align: center;
            cursor: pointer;
        }

        .card:hover { background: #151515; }

        /* --- THE FIX: NO BORDERS / NO HEADERS OVERLAY --- */
        .overlay {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #000; 
            z-index: 2000; 
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .overlay iframe { 
            width: 100%; 
            height: 100%; /* Game fills the screen */
            background: #000; 
            border: none;
            outline: none;
        }

        .terminate-btn {
            background: #ff0055;
            color: white;
            border: none; 
            padding: 10px 40px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            margin-bottom: 10px;
            z-index: 2001;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">TERMINAL</div>
        <div class="nav-links">
            <button onclick="showPage('home')" id="btn-home" class="active">HOME</button>
            <button onclick="showPage('games')" id="btn-games">GAMES</button>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="grid">
            <div class="card" onclick="showPage('games')">
                <h2 style="color:var(--accent)">GAMES</h2>
                <p>Launch high-fidelity titles.</p>
            </div>
        </div>
    </div>

    <div id="games" class="page">
        <div class="grid" id="gameGrid"></div>
    </div>

    <div id="gameOverlay" class="overlay">
        <iframe id="gameFrame" src="" allowfullscreen="true" scrolling="no"></iframe>
        <button class="terminate-btn" onclick="terminateSession()">CLOSE SESSION</button>
    </div>

    <script>
        // THIS URL IS THE SECRET: It bypasses the website wrapper
        const myGames = [
            { 
                name: "Basketball Stars", 
                url: "https://basketballstars-game.github.io/game/", 
                icon: "🏀" 
            }
        ];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('btn-' + pageId).classList.add('active');
        }

        function launchGame(url) {
            document.getElementById('gameOverlay').style.display = 'flex';
            document.getElementById('gameFrame').src = url;
        }

        function terminateSession() {
            document.getElementById('gameOverlay').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }

        function initGrid() {
            const gameGrid = document.getElementById('gameGrid');
            myGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => launchGame(game.url);
                card.innerHTML = `<div style="font-size: 3rem;">${game.icon}</div><h3>${game.name}</h3>`;
                gameGrid.appendChild(card);
            });
        }
        initGrid();
    </script>
</body>
</html>
