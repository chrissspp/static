<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Nexus OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #a855f7; 
            --bg: #020202;
            --glass: rgba(255, 255, 255, 0.05);
            --card: rgba(20, 20, 20, 0.8);
        }

        body { 
            margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: white; height: 100vh; display: flex; overflow: hidden; 
        }

        .sidebar { 
            width: 80px; background: var(--glass); backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; flex-direction: column; align-items: center; padding: 35px 0; gap: 40px; 
            z-index: 100;
        }
        .sidebar i { font-size: 1.5rem; color: #444; cursor: pointer; transition: 0.3s; }
        .sidebar i:hover, .sidebar i.active { color: var(--accent); filter: drop-shadow(0 0 10px var(--accent)); }

        .content { 
            flex-grow: 1; padding: 40px 60px; overflow-y: auto;
            background: radial-gradient(circle at top right, #1a1635 0%, #020202 100%);
        }

        h1 { font-size: 3rem; font-weight: 800; margin-bottom: 5px; }
        .version-tag { color: var(--accent); font-weight: 600; margin-bottom: 40px; display: block; }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
        }

        .settings-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 18px;
            transition: 0.3s ease;
        }

        .settings-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; color: #fff; }
        .settings-card p { margin: 0 0 20px 0; font-size: 0.85rem; color: #888; line-height: 1.5; }

        .key-form, select {
            width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333;
            color: white; border-radius: 10px; margin-bottom: 10px; outline: none;
            box-sizing: border-box; font-family: inherit;
        }

        .key-button {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer;
            transition: 0.2s; margin-top: 5px;
        }

        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-round {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider-round:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider-round { background-color: var(--accent); }
        input:checked + .slider-round:before { transform: translateX(21px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <i class="fa-solid fa-house" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gauge" onclick="location.href='dashboard.html'"></i>
        <i class="fa-solid fa-gamepad" onclick="location.href='games.html'"></i>
        <i class="fa-solid fa-gear active"></i>
    </div>

    <div class="content">
        <h1>Settings</h1>
        <span class="version-tag">Nexus Kernel: v1.0.4</span>

        <div class="settings-grid">
            <div class="settings-card">
                <h3>Stealth Mode</h3>
                <p>Open the site in an about:blank popup to hide your history.</p>
                <button onclick="openStealth()" class="key-button">Launch Popup</button>
            </div>

            <div class="settings-card">
                <h3>Panic Key</h3>
                <p>Instantly redirect to a safe site when triggered.</p>
                <input type="text" id="panic-key" placeholder="Key (Ex: Escape)" class="key-form" />
                <input type="text" id="panic-url" placeholder="Safe URL (Ex: google.com)" class="key-form" />
                <button class="key-button" onclick="savePanic()">Save Panic Config</button>
            </div>

            <div class="settings-card">
                <h3>Tab Disguise</h3>
                <p>Make this tab look like a school assignment.</p>
                <select id="cloak-picker">
                    <option value="none">Default (Nexus)</option>
                    <option value="google">Google</option>
                    <option value="canvas">Canvas</option>
                    <option value="clever">Clever</option>
                </select>
                <button class="key-button" onclick="applyCloak()">Apply Disguise</button>
            </div>

            <div class="settings-card">
                <h3>System Data</h3>
                <p>Export your Nexus configuration and game saves.</p>
                <button class="key-button" onclick="exportData()">Export Save</button>
                <button class="key-button" onclick="importData()" style="background: #333; margin-top: 5px;">Import Save</button>
            </div>
        </div>
    </div>

    <script>
        // --- NEXUS CORE LOGIC ---

        function savePanic() {
            const key = document.getElementById('panic-key').value;
            const url = document.getElementById('panic-url').value;
            localStorage.setItem('nexus-panic-key', key);
            localStorage.setItem('nexus-panic-url', url);
            alert('Panic Mode Armed.');
        }

        function applyCloak() {
            const type = document.getElementById('cloak-picker').value;
            localStorage.setItem('nexus-cloak', type);
            
            const icon = document.querySelector('link[rel="icon"]') || document.createElement('link');
            icon.rel = 'icon';

            if (type === 'google') {
                document.title = 'Google';
                icon.href = 'https://www.google.com/favicon.ico';
            } else if (type === 'canvas') {
                document.title = 'Dashboard';
                icon.href = 'https://canvas.instructure.com/favicon.ico';
            } else {
                document.title = 'Static | Nexus OS';
            }
            document.head.appendChild(icon);
            alert('Cloak Applied.');
        }

        function openStealth() {
            var win = window.open();
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.src = window.location.href;
            win.document.body.appendChild(iframe);
            window.location.replace('https://google.com');
        }

        // Apply Panic Key Listener across the site
        window.addEventListener('keydown', (e) => {
            const savedKey = localStorage.getItem('nexus-panic-key');
            const savedUrl = localStorage.getItem('nexus-panic-url');
            if (e.key === savedKey && savedUrl) {
                window.location.href = savedUrl.startsWith('http') ? savedUrl : 'https://' + savedUrl;
            }
        });

        window.onload = () => {
            // Load theme colors
            const saved = JSON.parse(localStorage.getItem('nexus_settings'));
            if (saved && saved.theme) {
                document.documentElement.style.setProperty('--accent', saved.theme);
            }
        };
    </script>
</body>
</html>
