<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Static | Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #a855f7; }
        body {
            margin: 0; display: flex; background: #050505;
            background-image: radial-gradient(circle at center, #1e1b4b 0%, #050505 100%);
            color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden;
        }
        .sidebar {
            width: 75px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 35px;
        }
        .sidebar i { font-size: 1.6rem; color: #555; cursor: pointer; transition: 0.3s; }
        .sidebar i:hover, .sidebar i.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        .content { flex-grow: 1; padding: 40px; overflow-y: auto; background: url('https://www.transparenttextures.com/patterns/stardust.png'); }
        h1 { font-size: 3rem; font-weight: 900; margin-top: 0; }
        .dot { display: inline-block; color: var(--accent); animation: float 3s infinite; }
        @keyframes float { 50% { transform: translateY(-10px); } }
        
        .apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 25px; }
        .game-card { 
            background: rgba(255,255,255,0.05); 
            padding: 15px; 
            border-radius: 15px; 
            text-align: center; 
            transition: 0.3s;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .game-card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fa-solid fa-house" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad active"></i>
        <i class="fa-solid fa-gear" onclick="location.href='settings.html'"></i>
    </div>

    <div class="content">
        <h1>Games<span class="dot">.</span></h1>
        <div id="game-container" class="apps">
            </div>
    </div>

    <script src="index-3.js"></script>
    <script src="c1.js"></script>
    
    <script>
        async function loadGames() {
            const container = document.getElementById('game-container');
            try {
                // Grabbing your loose apps.html file from GitHub root
                const response = await fetch('apps.html');
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                
                // Finds every link inside your apps.html
                const games = doc.querySelectorAll('a'); 
                
                if (games.length === 0) {
                    container.innerHTML = "<p>No games found inside apps.html. Make sure that file has links!</p>";
                    return;
                }

                games.forEach(game => {
                    const name = game.innerText || "Game";
                    const link = game.getAttribute('href') || "#";
                    const img = game.querySelector('img')?.src || "favicon.png";

                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.onclick = () => window.location.href = link;
                    card.innerHTML = `
                        <img src="${img}" onerror="this.src='favicon.png'">
                        <h3>${name}</h3>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Error loading apps.html:", err);
            }
        }
        window.addEventListener('DOMContentLoaded', loadGames);
    </script>
</body>
</html>
