<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #a020f0;
            --bg: #050505;
            --text-main: #ffffff;
        }

        body, html { 
            margin: 0; padding: 0; background: var(--bg); 
            color: var(--text-main); font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
        }

        .fade-in {
            animation: fadeIn 2s ease-in forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- NAV --- */
        nav { display: flex; justify-content: center; padding: 30px; gap: 60px; }
        .nav-item { 
            font-size: 1.8rem; cursor: pointer; opacity: 0.3; 
            transition: all 0.4s ease;
        }
        .nav-item:hover { 
            opacity: 1; color: var(--accent); transform: scale(1.2);
            filter: drop-shadow(0 0 8px var(--accent));
        }

        /* --- HERO --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 75vh;
            text-align: center;
        }

        .typing-container {
            display: flex;
            align-items: center;
            height: 6rem;
            margin-bottom: 5px;
            /* Container NO LONGER floats */
        }

        #typewriter {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5rem; font-weight: 700;
            letter-spacing: -3px; text-transform: lowercase;
            display: flex; /* Key for inline character animation */
        }

        /* --- INDIVIDUAL CHARACTER FLOAT --- */
        #typewriter span {
            display: inline-block;
            animation: charFloat 2.5s ease-in-out infinite;
        }

        @keyframes charFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); } /* Stronger move for visibility */
        }

        .cursor {
            width: 8px; height: 4.5rem; background-color: var(--accent);
            margin-left: 20px; border-radius: 2px;
            animation: blink 0.8s infinite;
            box-shadow: 0 0 15px var(--accent);
        }

        @keyframes blink { 50% { opacity: 0; } }

        .hero p { 
            opacity: 0.4; font-size: 1.2rem; margin-bottom: 45px; 
            font-weight: 300; letter-spacing: 4px; text-transform: uppercase;
            /* Simple fade-in only for sub-header now */
        }

        .btn-start {
            background: transparent; color: white; padding: 18px 60px;
            border-radius: 4px; font-family: 'Space Grotesk', sans-serif;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.4s; text-transform: uppercase; letter-spacing: 5px;
        }

        .btn-start:hover { 
            background: white; color: black;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.2);
            transform: translateY(-8px);
        }

        /* --- OVERLAY --- */
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { 
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); 
            background: white; color: black; padding: 10px 30px; border: none; 
            cursor: pointer; font-weight: bold; font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <nav class="fade-in">
        <div class="nav-item" onclick="location.reload()">🏠</div>
        <div class="nav-item" onclick="openGame()">🕹️</div>
        <div class="nav-item">📱</div>
        <div class="nav-item">⚙️</div>
    </nav>

    <div class="hero">
        <div class="typing-container">
            <span id="typewriter"></span>
            <div class="cursor"></div>
        </div>
        <p class="fade-in">freedom of the web</p>
        <button class="btn-start fade-in" onclick="openGame()">Enter Void</button>
    </div>

    <div id="game-overlay">
        <iframe id="game-frame" src=""></iframe>
        <button class="close-btn" onclick="closeGame()">KILL SESSION</button>
    </div>

    <script>
        const typewriterElement = document.getElementById('typewriter');
        
        const introPhrase = "welcome to static.";
        const loopPhrases = [
            "access granted.", 
            "unblock the world.", 
            "play without fear.",
            "no restrictions.", 
            "encryption active."
        ];

        let phraseIndex = -1;
        let charIndex = 0;
        let isDeleting = false;
        let typeSpeed = 100;

        function type() {
            const currentPhrase = (phraseIndex === -1) ? introPhrase : loopPhrases[phraseIndex];

            // --- THE NEW FLOATING INJECTION ---
            if (!isDeleting) {
                // When TYPING: Inject spans with staggered delays
                if (charIndex < currentPhrase.length) {
                    const char = currentPhrase.charAt(charIndex);
                    const span = document.createElement('span');
                    span.textContent = char;
                    
                    // Stagger: Delays are cumulative based on charIndex
                    span.style.animationDelay = `${charIndex * 0.05}s`; // Smooth wave

                    typewriterElement.appendChild(span);
                    charIndex++;
                    typeSpeed = 70; // Typing speed
                }
            } else {
                // When DELETING: Just remove the last span
                if (charIndex > 0) {
                    typewriterElement.removeChild(typewriterElement.lastChild);
                    charIndex--;
                    typeSpeed = 30; // Fast delete
                }
            }

            // --- Switching Logic (Remains the same) ---
            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true; 
                typeSpeed = 3000; // Pause at end of phrase
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                
                // Clear any lingering spaces
                typewriterElement.innerHTML = '';
                
                if (phraseIndex === -1) {
                    phraseIndex = 0;
                } else {
                    phraseIndex = (phraseIndex + 1) % loopPhrases.length;
                }
                
                typeSpeed = 500; // Pause before next phrase
            }

            setTimeout(type, typeSpeed);
        }

        window.onload = type;

        function openGame() {
            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('game-frame').src = 'https://basketballstars-game.github.io/game/';
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
