<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #a020f0; --bg: #000000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 85vh; text-align: center; }
        .typing-container { display: flex; align-items: center; height: 6rem; margin-bottom: 20px; }
        #typewriter { font-family: 'Space Grotesk', sans-serif; font-size: 5rem; font-weight: 700; letter-spacing: 2px; text-transform: lowercase; display: flex; flex-wrap: nowrap; min-height: 6rem; }
        #typewriter span { display: inline-block; min-width: 10px; animation: charFloat 1.2s ease-in-out infinite; }
        #typewriter span.rainbow {
            background-image: linear-gradient(-90deg, #ff0000, #ffcc00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            background-size: 200% 100%; animation: charFloat 1.2s ease-in-out infinite, rainbowShift 0.5s linear infinite;
        }
        @keyframes charFloat { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes rainbowShift { 0% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .proxy-wrapper { position: relative; margin-top: 20px; width: 500px; }
        .proxy-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 25px; border-radius: 12px; color: white; outline: none; backdrop-filter: blur(10px); }
        .btn-go { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--accent); border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 10px 30px; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="typing-container">
            <span id="typewriter"></span>
        </div>
        
        <div class="proxy-wrapper">
            <form id="proxy-form">
                <input type="text" class="proxy-input" id="url-input" placeholder="Search freely..." autocomplete="off">
                <button type="submit" class="btn-go">GO</button>
            </form>
        </div>
    </div>

    <div id="game-overlay">
        <iframe id="game-frame" src=""></iframe>
        <button class="close-btn" onclick="closeGame()">EXIT SESSION</button>
    </div>

    <script src="./scramjet.all.js"></script>
    <script>
        // Config
        window.__scramjet$config = {
            prefix: '/service/',
            codec: 'xor',
            bare: 'https://bare.duckdns.org/', // New Bare Server
            encodeUrl: (str) => {
                if (!str) return str;
                return encodeURIComponent(str.split('').map((char, i) => i % 2 ? String.fromCharCode(char.charCodeAt(0) ^ 2) : char).join(''));
            }
        };

        // SW Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: __scramjet$config.prefix });
            });
        }

        // Rainbow Typewriter
        const typewriterElement = document.getElementById('typewriter');
        const phrases = ["welcome to static.", "access granted.", "unblock the world."];
        let pIdx = 0, cIdx = 0, deleting = false;

        function type() {
            let current = phrases[pIdx];
            if (!deleting) {
                if (cIdx < current.length) {
                    const span = document.createElement('span');
                    if (current.includes("static") && cIdx >= 11) span.className = "rainbow";
                    span.textContent = current[cIdx] === " " ? "\u00A0" : current[cIdx];
                    typewriterElement.appendChild(span);
                    cIdx++;
                    setTimeout(type, 60);
                } else {
                    deleting = true;
                    setTimeout(type, 2000);
                }
            } else {
                if (cIdx > 0) {
                    typewriterElement.removeChild(typewriterElement.lastChild);
                    cIdx--;
                    setTimeout(type, 30);
                } else {
                    deleting = false;
                    pIdx = (pIdx + 1) % phrases.length;
                    setTimeout(type, 500);
                }
            }
        }
        type();

        // Proxy GO
        document.getElementById('proxy-form').onsubmit = (e) => {
            e.preventDefault();
            const url = document.getElementById('url-input').value;
            document.getElementById('game-overlay').style.display = 'block';
            const target = url.includes('.') ? (url.startsWith('http') ? url : 'https://' + url) : 'https://www.google.com/search?q=' + url;
            document.getElementById('game-frame').src = __scramjet$config.prefix + __scramjet$config.encodeUrl(target);
        };

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
