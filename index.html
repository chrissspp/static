<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUB</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: monospace; }
        #launcher { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .btn { background: #a020f0; color: white; padding: 20px 40px; cursor: pointer; border: none; font-size: 1.5rem; }
        
        /* The Fullscreen Fix */
        #game-container { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 999; }
        iframe { width: 100%; height: 100%; border: none; }
        .close { position: absolute; bottom: 20px; right: 20px; background: red; color: white; padding: 10px; cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>

    <div id="launcher">
        <h1 style="color:#a020f0">SYSTEM READY</h1>
        <button class="btn" onclick="openGame()">LAUNCH B-STARS</button>
    </div>

    <div id="game-container">
        <div class="close" onclick="closeGame()">CLOSE</div>
        <iframe id="frame" src=""></iframe>
    </div>

    <script>
        function openGame() {
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('frame').src = 'https://basketballstars-game.github.io/game/';
        }
        function closeGame() {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('frame').src = '';
        }
    </script>
</body>
</html>
