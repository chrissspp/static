<script>
    // Feature: Dynamic Greeting
    const hour = new Date().getHours();
    const greeting = hour < 12 ? "Good Morning" : hour < 18 ? "Good Afternoon" : "Good Evening";
    document.querySelector('p').innerText = `${greeting}, Commander. All systems operational.`;

    // Feature: Mouse Parallax Effect
    document.addEventListener('mousemove', (e) => {
        const x = (window.innerWidth / 2 - e.pageX) / 30;
        const y = (window.innerHeight / 2 - e.pageY) / 30;
        document.querySelector('.nebula').style.transform = `translate(${x}px, ${y}px)`;
        document.querySelector('h1').style.textShadow = `${x}px ${y}px 40px var(--accent-glow)`;
    });

    // Feature: URL Sanitizer
    function launch() {
        let val = document.getElementById('url-input').value.trim();
        if (val) {
            if (!val.includes('.')) val = "https://www.google.com/search?q=" + encodeURIComponent(val);
            else if (!val.startsWith('http')) val = "https://" + val;
            window.location.href = "/service/" + btoa(val);
        }
    }
</script>
