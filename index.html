<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #a020f0; --bg: #000000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Main UI */
        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; z-index: 1; position: relative; }
        .typing-container { display: flex; align-items: center; height: 6rem; margin-bottom: 20px; }
        #typewriter { font-family: 'Space Grotesk', sans-serif; font-size: 5rem; font-weight: 700; min-height: 6rem; letter-spacing: -2px; }
        
        .rainbow { 
            background-image: linear-gradient(-90deg, #ff0000, #ffcc00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            background-size: 200% 100%; 
            animation: rainbowShift 1s linear infinite; 
        }
        @keyframes rainbowShift { 0% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Input Box */
        .proxy-wrapper { position: relative; width: 550px; margin-top: 30px; }
        .proxy-input { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 18px 25px; 
            border-radius: 15px; 
            color: white; 
            font-size: 1.1rem;
            outline: none; 
            backdrop-filter: blur(15px);
            transition: 0.3s;
        }
        .proxy-input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 30px rgba(160, 32, 240, 0.2); }
        .btn-go { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 800; }

        /* Overlay */
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 25px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; z-index: 10000; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="typing-container">
            <span id="typewriter"></span>
        </div>
        
        <div class="proxy-wrapper">
            <form id="proxy-form">
                <input type="text" class="proxy-input" id="url-input" placeholder="Enter a URL or search freely..." autocomplete="off">
                <button type="submit" class="btn-go">GO</button>
            </form>
        </div>
    </div>

    <div id="game-overlay">
        <iframe id="game-frame" src=""></iframe>
        <button class="close-btn" onclick="closeGame()">EXIT SESSION</button>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/MercuryWorkshop/scramjet@main/dist/scramjet.all.js"></script>

    <script>
        // --- PROXY CONFIG ---
        window.__scramjet$config = {
            prefix: '/service/',
            codec: 'xor',
            bare: 'https://bare.duckdns.org/', // Reliable 2026 Bare Server
            encodeUrl: (str) => {
                if (!str) return str;
                return encodeURIComponent(str.split('').map((char, i) => i % 2 ? String.fromCharCode(char.charCodeAt(0) ^ 2) : char).join(''));
            }
        };

        // --- SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: __scramjet$config.prefix });
        }

        // --- RAINBOW TYPEWRITER ---
        const typewriter = document.getElementById('typewriter');
        const text = "welcome to static.";
        let charIdx = 0;

        function typeEffect() {
            if (charIdx < text.length) {
                const span = document.createElement('span');
                // Apply rainbow to "static."
                if (charIdx >= 11) span.className = 'rainbow';
                span.textContent = text[charIdx];
                typewriter.appendChild(span);
                charIdx++;
                setTimeout(typeEffect, 100);
            }
        }
        // Start the effect
        typeEffect();

        // --- FORM HANDLER ---
        document.getElementById('proxy-form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('url-input').value.trim();
            if (!input) return;

            let target = input;
            if (!input.includes('.')) {
                target = 'https://www.google.com/search?q=' + encodeURIComponent(input);
            } else if (!input.startsWith('http')) {
                target = 'https://' + input;
            }

            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('game-frame').src = __scramjet$config.prefix + __scramjet$config.encodeUrl(target);
        };

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
