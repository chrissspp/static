<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Static | Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #a855f7; }
        body {
            margin: 0; display: flex; background: #050505;
            background-image: radial-gradient(circle at center, #1e1b4b 0%, #050505 100%);
            color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden;
        }
        .sidebar {
            width: 75px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 35px;
        }
        .sidebar i { font-size: 1.6rem; color: #555; cursor: pointer; transition: 0.3s; }
        .sidebar i:hover, .sidebar i.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        .content { flex-grow: 1; padding: 40px; overflow-y: auto; background: url('https://www.transparenttextures.com/patterns/stardust.png'); }
        .dot { display: inline-block; color: var(--accent); animation: float 3s infinite; }
        @keyframes float { 50% { transform: translateY(-10px); } }
        .input-c { margin-bottom: 30px; display: flex; gap: 15px; }
        #search, #category {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 12px; border-radius: 12px; outline: none;
        }
        /* Grid for games */
        .apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .apps div { 
            background: rgba(255,255,255,0.05) !important; 
            padding: 15px !important; 
            border-radius: 15px !important; 
            text-align: center !important; 
            transition: 0.3s;
            cursor: pointer;
        }
        .apps div:hover { transform: translateY(-5px); border: 1px solid var(--accent); }
        .apps img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fa-solid fa-house" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad active"></i>
        <i class="fa-solid fa-gear" onclick="location.href='settings.html'"></i>
    </div>
    <div class="content">
        <h1>Games<span class="dot">.</span></h1>
        <div class="input-c">
            <input type="text" id="search" onkeyup="bar()" placeholder="Search library..." />
            <select id="category" name="category" onchange="category()">
                <option value="all">All Games</option>
                <option value="sports">Sports</option>
                <option value="flash">Flash</option>
            </select>
        </div>
        <div class="pinned"></div>
        <div class="apps"></div>
    </div>

    <script src="index-3.js"></script>
    <script src="c1.js"></script>
    <script src="m1.js"></script>
    
    <script>
        // Start the proxy engine
        window.addEventListener('DOMContentLoaded', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js', { scope: '/service/' });
            }
        });
    </script>
</body>
</html>
