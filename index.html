<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7c3aed;
            --sidebar-bg: rgba(15, 15, 20, 0.9);
        }
        body {
            margin: 0;
            display: flex;
            background: #050505;
            font-family: 'Inter', sans-serif;
            color: white;
            height: 100vh;
        }
        /* Sidebar (Same as Home) */
        .sidebar {
            width: 80px;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            gap: 40px;
        }
        .sidebar i { font-size: 1.8rem; color: rgba(255, 255, 255, 0.5); cursor: pointer; transition: 0.3s; }
        .sidebar i:hover, .active { color: var(--accent-purple); }

        /* Game Grid */
        .content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-purple); box-shadow: 0 0 20px rgba(124, 58, 237, 0.2); }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fa-solid fa-house" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad active" onclick="location.href='games.html'"></i>
        <i class="fa-solid fa-gear"></i>
    </div>

    <div class="content">
        <h1>Games</h1>
        <div class="grid">
            <div class="card" onclick="launchGame('https://example.com')">
                <img src="./imgs/duck.webp">
                <h3>Sample Game</h3>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@latest/dist/scramjet.codecs.js"></script>
    <script>
        function launchGame(url) {
            // This pulls the config we set in index.html
            const prefix = '/service/';
            const encoded = prefix + encodeURIComponent(url.split('').map((char, i) => i % 2 ? String.fromCharCode(char.charCodeAt(0) ^ 2) : char).join(''));
            window.location.href = encoded;
        }
    </script>
</body>
</html>
