<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #a020f0; --bg: #000000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .fade-in { animation: fadeIn 1s ease-in forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        nav { display: flex; justify-content: center; padding: 30px; gap: 60px; z-index: 10; position: relative; }
        .nav-item { font-size: 1.8rem; cursor: pointer; opacity: 0.3; transition: 0.4s; }
        .nav-item:hover { opacity: 1; color: var(--accent); transform: scale(1.2); }
        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 85vh; text-align: center; }
        .typing-container { display: flex; align-items: center; height: 6rem; margin-bottom: 20px; }
        #typewriter { font-family: 'Space Grotesk', sans-serif; font-size: 5rem; font-weight: 700; letter-spacing: 2px; text-transform: lowercase; display: flex; flex-wrap: nowrap; }
        #typewriter span { display: inline-block; min-width: 10px; animation: charFloat 1.2s ease-in-out infinite; }
        #typewriter span.space { width: 1.5rem; }
        #typewriter span.rainbow {
            background-image: linear-gradient(-90deg, #ff0000, #ffcc00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            background-size: 200% 100%; animation: charFloat 1.2s ease-in-out infinite, rainbowShift 0.5s linear infinite;
        }
        @keyframes charFloat { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes rainbowShift { 0% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .proxy-wrapper { position: relative; margin-top: 20px; width: 500px; animation: fadeIn 2s ease-in forwards; }
        .proxy-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 25px; border-radius: 12px; color: white; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; outline: none; backdrop-filter: blur(10px); transition: 0.3s; }
        .proxy-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(160, 32, 240, 0.2); background: rgba(255, 255, 255, 0.08); }
        .btn-go { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--accent); border: none; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .cursor { width: 8px; height: 4.5rem; background-color: var(--accent); margin-left: 20px; border-radius: 2px; animation: blink 0.5s infinite; box-shadow: 0 0 20px var(--accent); }
        @keyframes blink { 50% { opacity: 0; } }
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 10px 30px; border: none; cursor: pointer; font-weight: bold; letter-spacing: 2px; border-radius: 5px; }
    </style>
</head>
<body>

    <nav class="fade-in">
        <div class="nav-item" onclick="location.reload()">🏠</div>
        <div class="nav-item" onclick="openProxy('https://google.com')">🔍</div>
        <div class="nav-item" onclick="openProxy('https://discord.com')">📱</div>
        <div class="nav-item">⚙️</div>
    </nav>

    <div class="hero">
        <div class="typing-container">
            <span id="typewriter"></span>
            <div class="cursor"></div>
        </div>
        <div class="proxy-wrapper fade-in">
            <form id="proxy-form">
                <input type="text" class="proxy-input" id="url-input" placeholder="Search the web freely..." autocomplete="off">
                <button type="submit" class="btn-go">GO</button>
            </form>
        </div>
    </div>

    <div id="game-overlay">
        <iframe id="game-frame" src=""></iframe>
        <button class="close-btn" onclick="closeGame()">EXIT SESSION</button>
    </div>

    <script>
    <script src="/scram/scramjet.all.js"></script> <script>
    // --- 1. NEW SCRAMJET CONFIG ---
    window.__scramjet$config = {
        prefix: '/service/',
        codec: 'xor',
        // Updated 2026 Bare Server (If this fails, search for "Bare Server links")
        bare: 'https://bare.benroxy.com/', 
        encodeUrl: (str) => {
            if (!str) return str;
            return encodeURIComponent(str.split('').map((char, i) => i % 2 ? String.fromCharCode(char.charCodeAt(0) ^ 2) : char).join(''));
        }
    };

    // --- 2. REGISTRATION ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js', { scope: __scramjet$config.prefix });
        });
    }

    // --- 3. THE PROXY GO BUTTON ---
    const form = document.getElementById('proxy-form');
    const input = document.getElementById('url-input');

    form.onsubmit = (e) => {
        e.preventDefault();
        const url = input.value.trim();
        if (!url) return;

        document.getElementById('game-overlay').style.display = 'block';
        
        let targetUrl = url;
        if (!url.startsWith('http')) {
            targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(url);
        } else if (!(url.startsWith('https://') || url.startsWith('http://'))) {
            targetUrl = 'https://' + url;
        }

        // Use the modern prefix + encoded path
        const proxiedUrl = __scramjet$config.prefix + __scramjet$config.encodeUrl(targetUrl);
        document.getElementById('game-frame').src = proxiedUrl;
    };

    // --- [KEEP YOUR RAINBOW TYPING LOGIC HERE] ---
</script>
</body>
</html>
