<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Games</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:400,700&subset=latin" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #87dc83; /* Duck site green */
            --accent-green: #4a9d4f;
            --text-dark: #2e4a2d;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 50px 20px;
        }

        #typewriter {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            min-height: 4.5rem;
        }

        /* The Games Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            padding: 20px 50px 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: var(--card-bg);
            border: 3px solid var(--accent-green);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 0px var(--accent-green); /* Quizlet-style shadow */
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 0px var(--accent-green);
        }

        .game-card:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0px var(--accent-green);
        }

        .game-card img {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 12px;
            background: #f0f0f0;
        }

        .game-card h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
        }

        /* Proxy Session Overlay */
        #game-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ef5350;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            z-index: 10001;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="typewriter"></h1>
    </div>

    <div class="game-grid">
        
        <div class="game-card" onclick="launchGame('https://example.com/game1')">
            <img src="./imgs/duck.webp" alt="Game Icon">
            <h3>Game Name 1</h3>
        </div>

        <div class="game-card" onclick="launchGame('https://example.com/game2')">
            <img src="./imgs/duck.webp" alt="Game Icon">
            <h3>Game Name 2</h3>
        </div>

        </div>

    <div id="game-overlay">
        <button class="close-btn" onclick="closeGame()">EXIT GAME</button>
        <iframe id="game-frame"></iframe>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@latest/dist/scramjet.codecs.js"></script>
    <script>
        // Scramjet Logic
        window.__scramjet$config = {
            prefix: '/service/',
            codec: 'xor',
            encodeUrl: (str) => {
                if (!str) return str;
                return encodeURIComponent(str.split('').map((char, i) => i % 2 ? String.fromCharCode(char.charCodeAt(0) ^ 2) : char).join(''));
            }
        };

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: '/service/' });
        }

        // Typewriter Fix (waits for content to load)
        window.addEventListener('DOMContentLoaded', () => {
            const typewriter = document.getElementById('typewriter');
            const phrase = "welcome to static.";
            let i = 0;
            function type() {
                if (i < phrase.length) {
                    typewriter.textContent += phrase[i];
                    i++;
                    setTimeout(type, 100);
                }
            }
            type();
        });

        // Launch Game Function
        function launchGame(url) {
            const encoded = window.__scramjet$config.prefix + window.__scramjet$config.encodeUrl(url);
            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('game-frame').src = encoded;
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
