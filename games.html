<style>
    /* Add these styles to your existing games.html <style> section */
    
    .apps { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
        gap: 25px; 
        animation: fadeInUp 0.8s ease-out;
    }
    
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .game-card { 
        position: relative; overflow: hidden;
        background: rgba(255,255,255,0.03); 
        padding: 0; border-radius: 20px; 
        border: 1px solid rgba(255,255,255,0.05);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .game-card:hover { 
        background: rgba(255,255,255,0.08);
        border-color: var(--accent);
        transform: translateY(-10px) scale(1.02);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px var(--accent-glow);
    }

    .game-card img { 
        width: 100%; height: 150px; 
        object-fit: cover; border-radius: 20px 20px 0 0;
        transition: 0.5s;
    }
    
    .game-card:hover img { transform: scale(1.1); }

    .game-card h3 { 
        margin: 15px 0; font-size: 1rem; font-weight: 700; color: #ddd;
    }

    /* Loading bar for the top of the screen */
    #loading-bar {
        position: fixed; top: 0; left: 80px; width: 0%; height: 3px;
        background: var(--accent); transition: width 0.4s; z-index: 1000;
    }
</style>
