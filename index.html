<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #a020f0;
            --bg: #050505;
            --text-main: #ffffff;
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* --- NAV --- */
        nav { display: flex; justify-content: center; padding: 25px; gap: 60px; }
        .nav-item { font-size: 1.8rem; cursor: pointer; opacity: 0.4; transition: 0.4s; }
        .nav-item:hover { opacity: 1; color: var(--accent); transform: translateY(-2px); }

        /* --- HERO --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            text-align: center;
        }

        .typing-container {
            display: flex;
            align-items: center;
            height: 5rem;
            margin-bottom: 10px;
        }

        #typewriter {
            font-family: 'JetBrains Mono', monospace;
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .cursor {
            width: 6px;
            height: 4.5rem;
            background-color: var(--accent);
            margin-left: 15px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .hero p { 
            opacity: 0.5; 
            font-size: 1.4rem; 
            margin-bottom: 40px; 
            font-weight: 400;
            letter-spacing: 1px;
        }

        .btn-start {
            background: var(--accent);
            color: white;
            padding: 20px 50px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-start:hover { 
            transform: scale(1.1); 
            box-shadow: 0 0 30px rgba(160, 32, 240, 0.6); 
        }

        /* --- OVERLAY --- */
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: #ff0055; color: white; padding: 12px 35px; border: none; 
            border-radius: 50px; cursor: pointer; font-weight: bold; font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item" onclick="location.reload()">🏠</div>
        <div class="nav-item" onclick="openGame()">🕹️</div>
        <div class="nav-item">📱</div>
        <div class="nav-item">⚙️</div>
    </nav>

    <div class="hero">
        <div class="typing-container">
            <span id="typewriter"></span>
            <div class="cursor"></div>
        </div>
        <p>Start your unblocking journey today!</p>
        <button class="btn-start" onclick="openGame()">Launch System</button>
    </div>

    <div id="game-overlay">
        <iframe id="game-frame" src=""></iframe>
        <button class="close-btn" onclick="closeGame()">TERMINATE SESSION</button>
    </div>

    <script>
        const typewriterElement = document.getElementById('typewriter');
        
        // MASSIVE LIST OF PHRASES
        const phrases = [
            "Welcome to freedom.",
            "Everything is accessible.",
            "Play without limits.",
            "The ultimate station.",
            "Encrypted connection.",
            "Bypass the system.",
            "Ready for launch.",
            "Explore the void.",
            "Your digital playground.",
            "Zero restrictions.",
            "Stay undercover.",
            "Level up your browsing.",
            "Unlock the web.",
            "Secure. Fast. Private.",
            "Join the movement."
        ];

        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let typeSpeed = 100;

        function type() {
            const currentPhrase = phrases[phraseIndex];

            if (isDeleting) {
                typewriterElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
                typeSpeed = 40; // Fast delete
            } else {
                typewriterElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
                typeSpeed = 80; // Smooth type
            }

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true;
                typeSpeed = 2500; // Pause at end so you can read it
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typeSpeed = 400; // Pause before starting next phrase
            }

            setTimeout(type, typeSpeed);
        }

        window.onload = type;

        function openGame() {
            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('game-frame').src = 'https://basketballstars-game.github.io/game/';
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
