<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #a020f0;
            --bg: #000000;
        }

        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; overflow: hidden; }

        .fade-in { animation: fadeIn 1s ease-in forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        nav { display: flex; justify-content: center; padding: 30px; gap: 60px; }
        .nav-item { font-size: 1.8rem; cursor: pointer; opacity: 0.3; transition: 0.4s; }
        .nav-item:hover { opacity: 1; color: var(--accent); transform: scale(1.2); }

        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 75vh; text-align: center; }
        .typing-container { display: flex; align-items: center; height: 6rem; margin-bottom: 5px; }

        #typewriter {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5rem; font-weight: 700;
            letter-spacing: 2px; text-transform: lowercase;
            display: flex; flex-wrap: nowrap;
        }

        #typewriter span {
            display: inline-block;
            min-width: 10px;
            animation: charFloat 1.2s ease-in-out infinite;
        }

        #typewriter span.space { width: 1.5rem; }

        /* --- THE REVERSED RAINBOW (NO FREEZE) --- */
        #typewriter span.rainbow {
            background-image: linear-gradient(
                -90deg, 
                #ff0000, #ffcc00, #00ff00, 
                #00ffff, #0000ff, #ff00ff, #ff0000
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 200% 100%;
            /* Constant shift animation */
            animation: charFloat 1.2s ease-in-out infinite, rainbowShift 0.5s linear infinite;
        }

        @keyframes charFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes rainbowShift {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .cursor {
            width: 8px; height: 4.5rem; background-color: var(--accent);
            margin-left: 20px; border-radius: 2px;
            animation: blink 0.5s infinite;
            box-shadow: 0 0 20px var(--accent);
        }

        @keyframes blink { 50% { opacity: 0; } }

        .hero p { opacity: 0.4; font-size: 1.2rem; margin-bottom: 45px; letter-spacing: 4px; text-transform: uppercase; }

        .btn-start {
            background: transparent; color: white; padding: 18px 60px;
            border-radius: 4px; font-family: 'Space Grotesk', sans-serif;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.4s; text-transform: uppercase; letter-spacing: 5px;
        }

        .btn-start:hover { background: white; color: black; box-shadow: 0 0 50px rgba(160, 32, 240, 0.4); }

        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 10px 30px; border: none; cursor: pointer; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav class="fade-in">
        <div class="nav-item" onclick="location.reload()">🏠</div>
        <div class="nav-item" onclick="openGame()">🕹️</div>
        <div class="nav-item">📱</div>
        <div class="nav-item">⚙️</div>
    </nav>

    <div class="hero">
        <div class="typing-container">
            <span id="typewriter"></span>
            <div class="cursor"></div>
        </div>
        <p class="fade-in">freedom of the web</p>
        <button class="btn-start fade-in" onclick="openGame()">Enter Void</button>
    </div>

    <div id="game-overlay">
        <iframe id="game-frame" src=""></iframe>
        <button class="close-btn" onclick="closeGame()">KILL SESSION</button>
    </div>

    <script>
        const typewriterElement = document.getElementById('typewriter');
        const introPhrase = "welcome to static.";
        const loopPhrases = ["access granted.", "unblock the world.", "play without fear.", "the web is yours.", "encryption active."];

        let phraseIndex = -1;
        let charIndex = 0;
        let isDeleting = false;
        let typeSpeed = 100;

        function type() {
            let currentPhrase = (phraseIndex === -1) ? introPhrase : loopPhrases[phraseIndex];

            if (!isDeleting) {
                if (charIndex < currentPhrase.length) {
                    const char = currentPhrase.charAt(charIndex);
                    const span = document.createElement('span');
                    
                    if (phraseIndex === -1 && charIndex >= 11) {
                        span.className = "rainbow"; 
                        if (char === " ") span.className += " space";
                    } else if (char === " ") {
                        span.className = "space";
                    }
                    
                    if (char !== " ") span.textContent = char;
                    
                    span.style.animationDelay = `${charIndex * 0.05}s`; 
                    typewriterElement.appendChild(span);
                    charIndex++;
                    typeSpeed = 40;
                }
            } else {
                if (charIndex > 0) {
                    typewriterElement.removeChild(typewriterElement.lastChild);
                    charIndex--;
                    typeSpeed = 15;
                }
            }

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true; 
                typeSpeed = 2000; 
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                typewriterElement.innerHTML = '';
                if (phraseIndex === -1) { phraseIndex = 0; } 
                else { phraseIndex = (phraseIndex + 1) % loopPhrases.length; }
                typeSpeed = 200;
            }

            setTimeout(type, typeSpeed);
        }

        window.onload = type;

        function openGame() {
            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('game-frame').src = 'https://basketballstars-game.github.io/game/';
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
