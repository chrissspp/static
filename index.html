<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statics | Hub</title>
    <style>
        :root {
            --accent: #a020f0; 
            --bg-deep: #050505; 
            --card-bg: #0f0f0f;
            --text: #ffffff;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-deep);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 1rem;
            background: #000;
            border-bottom: 3px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); letter-spacing: 3px; }

        .nav-links button {
            background: none;
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-links button:hover, .nav-links button.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        /* --- PAGES --- */
        .page { display: none; padding: 40px 5%; animation: fadeIn 0.5s; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- UI ELEMENTS --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid #222;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .hero { text-align: center; padding: 60px 20px; background: linear-gradient(to bottom, #000, #11001a); }
        
        /* Overlay for Games/Apps */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column;
            justify-content: center; align-items: center;
        }
        iframe { border: 2px solid var(--accent); width: 90%; height: 80%; }
        .close-btn { margin-top: 15px; color: #ff0055; border: 1px solid #ff0055; background: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">STATICS</div>
        <div class="nav-links">
            <button onclick="showPage('home')" id="btn-home" class="active">Home</button>
            <button onclick="showPage('games')" id="btn-games">Games</button>
            <button onclick="showPage('apps')" id="btn-apps">Apps</button>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="hero">
            <h1>Welcome to Statics</h1>
            <p style="color: var(--accent);">Your centralized hub for web-based entertainment.</p>
        </div>
        <div class="grid">
            <div class="card" onclick="showPage('games')">
                <h2>Browse Games</h2>
                <p>400+ titles available</p>
            </div>
            <div class="card" onclick="showPage('apps')">
                <h2>Utility Apps</h2>
                <p>Tools and productivity</p>
            </div>
        </div>
    </div>

    <div id="games" class="page">
        <h1>Games Library</h1>
        <div class="grid" id="gameGrid">
            <div class="card" onclick="openGame('https://html5.gamedistribution.com/f312653358ec4c959a68e43bef2b72c6/')">
                <div style="font-size:3rem">🏎️</div>
                <h3>Slippery Drift</h3>
                <button style="color:var(--accent); background:none; border:1px solid var(--accent)">PLAY</button>
             </div>
        </div>
    </div>

    <div id="apps" class="page">
        <h1>Utility Apps</h1>
        <div class="grid">
            <div class="card">
                <div style="font-size:3rem">📟</div>
                <h3>Calculator</h3>
                <p>Status: Offline</p>
            </div>
            <div class="card">
                <div style="font-size:3rem">✍️</div>
                <h3>Text Editor</h3>
                <p>Status: Encrypted</p>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div id="container" style="width:100%; display:flex; justify-content:center;"></div>
        <button class="close-btn" onclick="closeGame()">TERMINATE SESSION</button>
    </div>

    <script>
        // PAGE SWITCHER LOGIC
        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Deactivate all buttons
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
            
            // Show selected page
            document.getElementById(pageId).classList.add('active');
            // Active button
            document.getElementById('btn-' + pageId).classList.add('active');
        }

        // GAME OPENER LOGIC
        function openGame(url) {
            const overlay = document.getElementById('overlay');
            const container = document.getElementById('container');
            overlay.style.display = 'flex';
            container.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen></iframe>`;
        }

        function closeGame() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('container').innerHTML = '';
        }
    </script>
</body>
</html>
