<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --accent: #a855f7; }
        body { margin: 0; display: flex; background: #050505; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { width: 75px; background: rgba(10, 10, 10, 0.9); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 35px; }
        .sidebar i { font-size: 1.6rem; color: #555; cursor: pointer; transition: 0.3s; }
        .sidebar i:hover, .sidebar i.active { color: var(--accent); }
        .content { flex-grow: 1; padding: 40px; overflow-y: auto; background: url('https://www.transparenttextures.com/patterns/stardust.png'); }
        .apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        /* Style for cards generated by c1.js */
        .apps div { background: rgba(255,255,255,0.05) !important; padding: 15px !important; border-radius: 15px !important; text-align: center !important; }
        .apps img { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fa-solid fa-house" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad active"></i>
        <i class="fa-solid fa-gear"></i>
    </div>
    <div class="content">
        <h1>Games<span>.</span></h1>
        <div class="apps"></div> </div>
    <script src="index-3.js"></script>
    <script src="c1.js"></script>
    <script src="m1.js"></script>
</body>
</html>
