<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #a020f0;
            --bg: #050505;
            --text-main: #ffffff;
        }

        body, html { 
            margin: 0; padding: 0; background: var(--bg); 
            color: var(--text-main); font-family: 'Outfit', sans-serif; 
            overflow: hidden; 
        }

        .fade-in { animation: fadeIn 2s ease-in forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        nav { display: flex; justify-content: center; padding: 30px; gap: 60px; }
        .nav-item { font-size: 1.8rem; cursor: pointer; opacity: 0.3; transition: all 0.4s ease; }
        .nav-item:hover { opacity: 1; color: var(--accent); transform: scale(1.2); }

        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 75vh;
            text-align: center;
        }

        .typing-container {
            display: flex;
            align-items: center;
            height: 6rem;
            margin-bottom: 5px;
        }

        #typewriter {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5rem; font-weight: 700;
            letter-spacing: 2px;
            text-transform: lowercase;
            display: flex;
            flex-wrap: nowrap;
        }

        /* --- CHARACTER STYLE & FLOAT --- */
        #typewriter span {
            display: inline-block;
            min-width: 10px;
            /* Faster float to match the fast rainbow */
            animation: charFloat 2s ease-in-out infinite;
        }

        #typewriter span.space {
            width: 1.5rem;
        }

        /* --- FAST RAINBOW --- */
        #typewriter span.rainbow {
            background-image: linear-gradient(
                90deg, 
                #ff0055, #ffcc00, #33ff00, 
                #00ffee, #a020f0, #ff0055
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-size: 300% 100%;
            /* 1.5s is the "Fast" setting */
            animation: charFloat 2s ease-in-out infinite, rainbowShift 1.5s linear infinite;
        }

        @keyframes charFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Shifts the background gradient rapidly */
        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .cursor {
            width: 8px; height: 4.5rem; background-color: var(--accent);
            margin-left: 20px; border-radius: 2px;
            animation: blink 0.8s infinite;
            box-shadow: 0 0 15px var(--accent);
        }

        @keyframes blink { 50% { opacity: 0; } }

        .hero p { opacity: 0.4; font-size: 1.2rem; margin-bottom: 45px; letter-spacing: 4px; text-transform: uppercase; }

        .btn-start {
            background: transparent; color: white; padding: 18px 60px;
            border-radius: 4px; font-family: 'Space Grotesk', sans-serif;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.4s; text-transform: uppercase; letter-spacing: 5px;
        }

        .btn-start:hover { background: white; color: black; transform: translateY(-8px); }

        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 10px 30px; border: none; cursor: pointer; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav class="fade-in">
        <div class="nav-item" onclick="location.reload()">🏠</div>
        <div class="nav-item" onclick="openGame()">🕹️</div>
        <div class="nav-item">📱</div>
        <div class="nav-item">⚙️</div>
    </nav>

    <div class="hero">
        <div class="typing-container">
            <span id="typewriter"></span>
            <div class="cursor"></div>
        </div>
        <p class="fade-in">freedom of the web</p>
        <button class="btn-start fade-in" onclick="openGame()">Enter Void</button>
    </div>

    <div id="game-overlay">
        <iframe id="game-frame" src=""></iframe>
        <button class="close-btn" onclick="closeGame()">KILL SESSION</button>
    </div>

    <script>
        const typewriterElement = document.getElementById('typewriter');
        
        const introPhrase = "welcome to static.";
        const loopPhrases = [
            "access granted.", 
            "unblock the world.", 
            "play without fear.",
            "the web is yours.",
            "encryption active."
        ];

        let phraseIndex = -1;
        let charIndex = 0;
        let isDeleting = false;
        let typeSpeed = 100;

        function type() {
            let currentPhrase = (phraseIndex === -1) ? introPhrase : loopPhrases[phraseIndex];

            if (!isDeleting) {
                if (charIndex < currentPhrase.length) {
                    const char = currentPhrase.charAt(charIndex);
                    const span = document.createElement('span');
                    
                    if (phraseIndex === -1 && charIndex >= 11) {
                        span.className = "rainbow"; 
                        if (char === " ") span.className += " space";
                    } else if (char === " ") {
                        span.className = "space";
                    }
                    
                    if (char !== " ") span.textContent = char;
                    
                    span.style.animationDelay = `${charIndex * 0.08}s`; 
                    typewriterElement.appendChild(span);
                    charIndex++;
                    typeSpeed = 70;
                }
            } else {
                if (charIndex > 0) {
                    typewriterElement.removeChild(typewriterElement.lastChild);
                    charIndex--;
                    typeSpeed = 30;
                }
            }

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true; 
                typeSpeed = 3000; 
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                typewriterElement.innerHTML = '';
                if (phraseIndex === -1) { phraseIndex = 0; } 
                else { phraseIndex = (phraseIndex + 1) % loopPhrases.length; }
                typeSpeed = 500;
            }

            setTimeout(type, typeSpeed);
        }

        window.onload = type;

        function openGame() {
            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('game-frame').src = 'https://basketballstars-game.github.io/game/';
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
