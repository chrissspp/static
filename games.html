<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #a855f7; }
        body { margin: 0; display: flex; background: #050505; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { width: 75px; background: rgba(10, 10, 10, 0.9); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 35px; z-index: 100; }
        .sidebar i { font-size: 1.6rem; color: #555; cursor: pointer; transition: 0.3s; }
        .sidebar i.active { color: var(--accent); }
        .content { flex-grow: 1; position: relative; background-image: radial-gradient(circle at center, #1e1b4b 0%, #050505 100%); }
        #library { padding: 40px; height: 100%; overflow-y: auto; box-sizing: border-box; }
        .apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .game-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .game-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .game-card img { width: 100%; border-radius: 10px; margin-bottom: 10px; height: 120px; object-fit: cover; }
        
        /* The Game Window */
        #game-view { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .back-btn { position: absolute; top: 20px; right: 20px; background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; z-index: 200; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fa-solid fa-house" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad active"></i>
        <i class="fa-solid fa-gear"></i>
    </div>

    <div class="content">
        <div id="game-view">
            <button class="back-btn" onclick="closeGame()">Back</button>
            <iframe id="game-frame"></iframe>
        </div>

        <div id="library">
            <h1>Games<span>.</span></h1>
            <div id="game-container" class="apps">
                </div>
        </div>
    </div>

    <script>
        function openGame(url) {
            document.getElementById('game-frame').src = url;
            document.getElementById('library').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
        }

        function closeGame() {
            document.getElementById('game-frame').src = "";
            document.getElementById('library').style.display = 'block';
            document.getElementById('game-view').style.display = 'none';
        }

        async function loadGames() {
            const container = document.getElementById('game-container');
            const res = await fetch('apps.html');
            const text = await res.text();
            const doc = new DOMParser().parseFromString(text, 'text/html');
            const links = doc.querySelectorAll('a');
            
            container.innerHTML = '';
            links.forEach(link => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => openGame(link.getAttribute('href'));
                card.innerHTML = `<img src="favicon.png"><h3>${link.innerText}</h3>`;
                container.appendChild(card);
            });
        }
        window.onload = loadGames;
    </script>
</body>
</html>
