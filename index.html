<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7c3aed;
            --sidebar-bg: rgba(15, 15, 20, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #050505 100%);
            color: white;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 80px;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            gap: 40px;
            z-index: 100;
        }

        .sidebar i {
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar i:hover {
            color: var(--accent-purple);
            transform: scale(1.1);
        }

        .active { color: var(--accent-purple) !important; }

        /* Main Content */
        .container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            background: linear-gradient(to right, #ffffff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            margin-top: 30px;
            width: 500px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <i class="fa-solid fa-house active" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad" onclick="location.href='games.html'"></i>
        <i class="fa-solid fa-gear"></i>
    </div>

    <div class="container">
        <h1>Static</h1>
        <p style="letter-spacing: 3px; opacity: 0.6;">START YOUR JOURNEY</p>
        
        <div class="search-box">
            <input type="text" placeholder="Enter URL or Search...">
        </div>
    </div>

</body>
</html>
