<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #a855f7; }
        body { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: #050505; 
            background-image: radial-gradient(circle at 50% 80%, #2e1065 0%, #050505 70%); 
            color: white; height: 100vh; display: flex; overflow: hidden; 
        }
        
        .sidebar { 
            width: 75px; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); 
            border-right: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 35px; 
            z-index: 100;
        }
        .sidebar i { font-size: 1.6rem; color: #555; cursor: pointer; transition: 0.3s; }
        .sidebar i:hover, .sidebar i.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        .container { 
            flex-grow: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: url('https://www.transparenttextures.com/patterns/stardust.png'); 
        }
        h1 { font-size: 4rem; font-weight: 900; margin-bottom: 10px; }
        .accent-text { color: var(--accent); }

        .search-box { margin-top: 40px; width: 100%; max-width: 500px; position: relative; }
        .search-box input { 
            width: 100%; padding: 18px 30px; border-radius: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(255, 255, 255, 0.05); color: white; 
            font-size: 1.1rem; outline: none; box-sizing: border-box;
        }
        .go-btn { 
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%); 
            background: var(--accent); border: none; color: white; 
            padding: 10px 25px; border-radius: 30px; font-weight: 800; cursor: pointer; 
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fa-solid fa-house active" onclick="window.location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad" onclick="window.location.href='games.html'"></i>
        <i class="fa-solid fa-gear"></i>
    </div>

    <div class="container">
        <h1>Static<span class="accent-text">.</span></h1>
        <div class="search-box">
            <input type="text" id="url-input" placeholder="Enter URL or Search...">
            <button class="go-btn" onclick="launchProxy()">Go</button>
        </div>
    </div>

    <script>
        // Simple launcher
        function launchProxy() {
            const val = document.getElementById('url-input').value;
            if (val) {
                // Tries to use your service worker path
                window.location.href = "/service/" + btoa(val);
            }
        }

        // Allow 'Enter' key to work
        document.getElementById('url-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') launchProxy();
        });
    </script>
</body>
</html>
