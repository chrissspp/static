<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Nexus OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #a855f7; /* Keep the signature purple accent */
            --bg: #020202;
            --glass: rgba(255, 255, 255, 0.03);
            --text: #ffffff;
        }

        body {
            margin: 0; padding: 0; font-family: 'Roboto', sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }

        /* Top Bar & Branding */
        .top-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: var(--glass); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; align-items: center; padding: 0 30px; box-sizing: border-box;
            z-index: 1000;
        }
        .brand { font-weight: 700; font-size: 1.2rem; }
        .brand span { color: var(--accent); }

        /* Progress Bar (at the very top, like the image) */
        .loading-progress {
            position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, #d946ef, #3b82f6, #22c55e);
            z-index: 1001;
        }

        /* Content Container */
        .container { text-align: center; z-index: 100; margin-top: 60px; }
        h1 { font-size: 2rem; font-weight: 400; margin: 0 0 10px 0; letter-spacing: -1px; }
        p { color: #888; font-size: 1rem; margin: 0 0 20px 0; }

        /* Custom Button Styling */
        .button-group { display: flex; gap: 10px; justify-content: center; }
        .btn {
            background: #ffffff; color: #000000; font-weight: 700; font-size: 0.9rem;
            padding: 10px 20px; border-radius: 8px; text-decoration: none;
            transition: all 0.2s ease; border: 2px solid transparent; cursor: pointer;
        }
        .btn:hover { background: transparent; color: #ffffff; border-color: #ffffff; }

        /* Keep the purple accent for the Proxied button */
        .btn.proxied { background: var(--accent); color: white; }
        .btn.proxied:hover { background: transparent; border-color: var(--accent); color: var(--accent); }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">Nexus<span> OS</span></div>
    </div>

    <div class="loading-progress"></div>

    <div class="container">
        <h1>Dashboard Loading...</h1>
        <p>This page usually updates when the site loads. Report errors below.</p>

        <div class="button-group">
            <a href="index.html" class="btn">Go Back Home</a>

            <a href="https://discord.gg/YOUR_INVITE_HERE" target="_blank" class="btn">Join Our Discord (Direct)</a>
            
            <a onclick="loadProxiedDiscord()" class="btn proxied">Join Our Discord (Proxied)</a>
        </div>
    </div>

    <script>
        // =============================================
        //   STEP 2: ALSO REPLACE THIS URL WITH YOUR DISCORD INVITE
        // =============================================
        const myDiscordUrl = "https://discord.gg/YOUR_INVITE_HERE";

        function loadProxiedDiscord() {
            // This function takes your invite and encodes it through your active proxy tunnel.
            // This is crucial for users on restricted networks.
            if ('Ultraviolet' in window) {
                // Assuming you use Ultraviolet (UV) standard:
                location.href = __uv$config.prefix + __uv$config.encodeUrl(myDiscordUrl);
            } else {
                // Fallback for simple setups or if UV hasn't loaded yet
                location.href = "/service/" + btoa(myDiscordUrl);
            }
        }
    </script>
</body>
</html>
