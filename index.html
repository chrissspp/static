<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space | Hub</title>
    <style>
        :root {
            --accent: #a020f0;
            --bg: #050505;
            --nav-bg: #000000;
        }

        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: sans-serif; overflow-x: hidden; }

        /* --- GOINTOSPACE STYLE NAV --- */
        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: var(--nav-bg);
            gap: 40px;
        }

        .nav-item {
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.6;
            transition: 0.3s;
        }

        .nav-item:hover { opacity: 1; color: var(--accent); }

        /* --- HERO SECTION --- */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            text-align: center;
        }

        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .hero p { opacity: 0.7; margin-bottom: 30px; font-size: 1.2rem; }

        .btn-start {
            background: var(--accent);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
        }

        /* --- FULLSCREEN GAME OVERLAY --- */
        #game-overlay {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100vw; height: 100vh; background: #000; z-index: 1000;
        }
        
        iframe { width: 100%; height: 100%; border: none; }

        .close-session {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(255, 0, 85, 0.8); color: white;
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item" onclick="showSection('home')">🏠</div>
        <div class="nav-item" onclick="showSection('games')">🕹️</div>
        <div class="nav-item" onclick="showSection('apps')">📱</div>
        <div class="nav-item" onclick="showSection('settings')">⚙️</div>
    </nav>

    <div id="home" class="section">
        <div class="hero">
            <h1>Welcome to freedom.</h1>
            <p>Start your unblocking journey today!</p>
            <button class="btn-start" onclick="showSection('games')">Get Started</button>
        </div>
    </div>

    <div id="games" class="section" style="display:none; padding: 50px;">
        <div style="background:#111; padding:40px; border-radius:15px; text-align:center; cursor:pointer;" 
             onclick="launchGame('https://basketballstars-game.github.io/game/')">
            <h2>B-STARS</h2>
            <p>Direct Clean Link</p>
        </div>
    </div>

    <div id="game-overlay">
        <div class="close-session" onclick="closeGame()">CLOSE</div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        function launchGame(url) {
            document.getElementById('game-overlay').style.display = 'block';
            document.getElementById('game-frame').src = url;
        }

        function closeGame() {
            document.getElementById('game-overlay').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
