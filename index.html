<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Nexus</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #a855f7; --accent-glow: rgba(168, 85, 247, 0.4); }
        body { 
            margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020202; color: white; height: 100vh; display: flex; overflow: hidden; 
        }

        /* Animated Nebula Background */
        .nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #020202 100%);
            z-index: -1;
        }
        .nebula::after {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            animation: rotate 100s linear infinite; opacity: 0.3;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Modern Glass Sidebar */
        .sidebar { 
            width: 80px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); 
            border-right: 1px solid rgba(255, 255, 255, 0.1); 
            display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 40px; z-index: 100;
        }
        .sidebar i { 
            font-size: 1.5rem; color: #666; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .sidebar i:hover, .sidebar i.active { 
            color: var(--accent); transform: scale(1.2); filter: drop-shadow(0 0 10px var(--accent)); 
        }

        /* Main UI */
        .container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        h1 { font-size: 5rem; font-weight: 800; margin: 0; letter-spacing: -3px; }
        .dot { color: var(--accent); text-shadow: 0 0 30px var(--accent); }
        
        .search-box { 
            margin-top: 50px; width: 100%; max-width: 600px; position: relative; 
            transition: transform 0.3s ease;
        }
        .search-box:focus-within { transform: scale(1.02); }
        
        .search-box input { 
            width: 100%; padding: 22px 40px; border-radius: 100px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(255, 255, 255, 0.05); color: white; 
            font-size: 1.2rem; outline: none; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow); }
        
        .go-btn { 
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%); 
            background: var(--accent); border: none; color: white; 
            padding: 14px 35px; border-radius: 100px; font-weight: 800; cursor: pointer; 
            box-shadow: 0 5px 15px var(--accent-glow); transition: 0.3s;
        }
        .go-btn:hover { transform: translateY(-50%) scale(1.05); filter: brightness(1.2); }
    </style>
</head>
<body>
    <div class="nebula"></div>
    <div class="sidebar">
        <i class="fa-solid fa-house active" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad" onclick="location.href='games.html'"></i>
        <i class="fa-solid fa-gear"></i>
    </div>

    <div class="container">
        <h1>Static<span class="dot">.</span></h1>
        <p style="color: #888; margin-top: 10px; font-weight: 500;">Your Unblocked Space Station</p>
        <div class="search-box">
            <input type="text" id="url-input" placeholder="Navigate the web...">
            <button class="go-btn" onclick="launch()">Go</button>
        </div>
    </div>

    <script>
        function launch() {
            const val = document.getElementById('url-input').value;
            if (val) window.location.href = "/service/" + btoa(val);
        }
        document.getElementById('url-input').onkeypress = (e) => e.key === 'Enter' && launch();
    </script>
</body>
</html>
