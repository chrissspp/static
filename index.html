<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Static Hub</title>
    <style>
        :root {
            --accent: #a020f0; 
            --bg-deep: #050505; 
            --card-bg: #0f0f0f;
            --text: #ffffff;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-deep);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 1.5rem;
            background: #000;
            border-bottom: 3px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 0 15px var(--accent);
        }

        .logo { font-size: 1.8rem; font-weight: bold; color: var(--accent); letter-spacing: 5px; text-shadow: 0 0 10px var(--accent); }

        .nav-links button {
            background: none;
            border: none;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            font-size: 1rem;
            transition: 0.3s;
        }

        .nav-links button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* --- PAGES --- */
        .page { display: none; padding: 40px 5%; animation: fadeIn 0.4s ease-in; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hero { text-align: center; padding: 80px 20px; background: radial-gradient(circle, #1a0033 0%, #050505 100%); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid #222;
            padding: 30px;
            text-align: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent);
            transform: translateY(-5px);
        }

        /* --- OVERLAY PLAYER --- */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .overlay iframe { 
            border: 2px solid var(--accent); 
            width: 90%; 
            height: 80%; 
            background: #000; 
            box-shadow: 0 0 30px var(--accent); 
        }

        .terminate-btn {
            margin-top: 20px;
            background: none;
            color: #ff0055;
            border: 2px solid #ff0055;
            padding: 10px 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .terminate-btn:hover { background: #ff0055; color: white; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">TERMINAL</div>
        <div class="nav-links">
            <button onclick="showPage('home')" id="btn-home" class="active">HOME</button>
            <button onclick="showPage('games')" id="btn-games">GAMES</button>
            <button onclick="showPage('apps')" id="btn-apps">APPS</button>
        </div>
    </nav>

    <div id="home" class="page active">
        <div class="hero">
            <h1 style="font-size: 3.5rem; margin-bottom: 0;">VIRTUAL HUB</h1>
            <p style="color: var(--accent); letter-spacing: 2px;">ENCRYPTED // STATIC ACCESS</p>
        </div>
        <div class="grid">
            <div class="card" onclick="showPage('games')">
                <h2 style="color:var(--accent)">GAMES</h2>
                <p>Launch high-fidelity titles.</p>
            </div>
            <div class="card" onclick="showPage('apps')">
                <h2 style="color:var(--accent)">SYSTEM APPS</h2>
                <p>Web-based utility tools.</p>
            </div>
        </div>
    </div>

    <div id="games" class="page">
        <h1>DATABASE</h1>
        <div class="grid" id="gameGrid"></div>
    </div>

    <div id="apps" class="page">
        <h1>SYSTEM APPS</h1>
        <div class="grid">
            <div class="card">
                <div style="font-size: 3rem;">📟</div>
                <h3>CALCULATOR</h3>
                <p>Status: Active</p>
            </div>
        </div>
    </div>

    <div id="gameOverlay" class="overlay">
        <div id="playerContainer" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center;"></div>
        <button class="terminate-btn" onclick="terminateSession()">TERMINATE SESSION</button>
    </div>

    <script>
        const myGames = [
            { 
                name: "Basketball Stars", 
                url: "https://basketballstars-game.github.io/", 
                icon: "🏀" 
            },
            { 
                name: "Racing Limits", 
                url: "https://www.addictinggames.com/embed/html5-games/20543", 
                icon: "🏎️" 
            }
        ];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('btn-' + pageId).classList.add('active');
        }

        function launchGame(url) {
            const overlay = document.getElementById('gameOverlay');
            const container = document.getElementById('playerContainer');
            overlay.style.display = 'flex';
            container.innerHTML = `<iframe src="${url}" allowfullscreen="true" frameborder="0" scrolling="no" style="width: 90%; height: 80%;"></iframe>`;
        }

        function terminateSession() {
            document.getElementById('gameOverlay').style.display = 'none';
            document.getElementById('playerContainer').innerHTML = '';
        }

        function initGrid() {
            const gameGrid = document.getElementById('gameGrid');
            gameGrid.innerHTML = ''; 

            myGames.forEach(game => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => launchGame(game.url);
                card.innerHTML = `
                    <div style="font-size: 3.5rem;">${game.icon}</div>
                    <h3>${game.name}</h3>
                    <p style="color:var(--accent)">INITIALIZE</p>
                `;
                gameGrid.appendChild(card);
            });

            for(let i = myGames.length + 1; i <= 20; i++) {
                const slot = document.createElement('div');
                slot.className = 'card';
                slot.style.opacity = "0.2";
                slot.innerHTML = `<h3>SLOT ${i}</h3><p>EMPTY</p>`;
                gameGrid.appendChild(slot);
            }
        }

        initGrid();
    </script>
</body>
</html>
