<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Static | Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --accent: #a855f7; }
        body { margin: 0; display: flex; background: #050505; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { width: 75px; background: rgba(10, 10, 10, 0.9); display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 35px; border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar i { font-size: 1.6rem; color: #555; cursor: pointer; }
        .sidebar i.active { color: var(--accent); }
        .content { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .apps { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        /* Manual Game Card Styling */
        .card { 
            background: rgba(255,255,255,0.05); 
            padding: 15px; 
            border-radius: 15px; 
            text-align: center; 
            cursor: pointer; 
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fa-solid fa-house" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad active"></i>
        <i class="fa-solid fa-gear"></i>
    </div>
    <div class="content">
        <h1>Games<span>.</span></h1>
        <div class="apps">
            <div class="card" onclick="launchGame('https://google.com')">
                <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_128dp.png">
                <h3>Google Test</h3>
            </div>

            <div class="card" onclick="launchGame('https://poki.com')">
                <img src="https://via.placeholder.com/150">
                <h3>Poki Games</h3>
            </div>
        </div>
    </div>

    <script>
        function launchGame(url) {
            // Using a simple Base64 encoding for the proxy launch
            window.location.href = '/service/' + btoa(url);
        }
    </script>
</body>
</html>
