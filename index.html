<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #a855f7;
            --sidebar-bg: rgba(10, 10, 10, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #050505;
            background-image: radial-gradient(circle at 50% 80%, #2e1065 0%, #050505 70%);
            color: white;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 75px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 0;
            gap: 35px;
            z-index: 100;
        }

        .sidebar i {
            font-size: 1.6rem;
            color: #555;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar i:hover, .sidebar i.active {
            color: var(--accent-purple);
            text-shadow: 0 0 15px var(--accent-purple);
            transform: scale(1.1);
        }

        /* Main Welcome Container */
        .container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
        }

        /* Typewriter Styling */
        #typewriter {
            color: var(--accent-purple);
            border-right: 3px solid var(--accent-purple);
            padding-right: 8px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { border-color: transparent; }
            50% { border-color: var(--accent-purple); }
        }

        .tagline {
            font-size: 1.1rem;
            margin-top: 15px;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        /* Search / Proxy Box */
        .search-box {
            margin-top: 40px;
            width: 100%;
            max-width: 550px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 18px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.4s;
        }

        .go-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent-purple);
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 800;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <i class="fa-solid fa-house active" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad" onclick="location.href='games.html'"></i>
        <i class="fa-solid fa-gear" onclick="location.href='settings.html'"></i>
    </div>

    <div class="container">
        <h1>Welcome to <span id="typewriter"></span></h1>
        <p class="tagline">Start your unblocking journey today!</p>
        
        <div class="search-box">
            <input type="text" id="url-input" placeholder="Search Google or enter a URL...">
            <button class="go-btn" onclick="launchProxy()">Get Started</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@latest/dist/scramjet.codecs.js"></script>
    <script>
        // 1. Looping Typewriter Logic
        const textElement = document.getElementById('typewriter');
        const phrases = ["static", "unblocked", "the web", "freedom"];
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        let typeSpeed = 150;

        function typeLoop() {
            const currentPhrase = phrases[phraseIndex];
            if (isDeleting) {
                textElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
                typeSpeed = 80;
            } else {
                textElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
                typeSpeed = 150;
            }

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true;
                typeSpeed = 2000; // Pause at end
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                typeSpeed = 500;
            }
            setTimeout(typeLoop, typeSpeed);
        }

        // 2. Proxy Logic
        window.__scramjet$config = {
            prefix: '/service/',
            codec: 'xor',
            encodeUrl: (str) => {
                if (!str) return str;
                return encodeURIComponent(str.split('').map((char, i) => i % 2 ? String.fromCharCode(char.charCodeAt(0) ^ 2) : char).join(''));
            }
        };

        function launchProxy() {
            const input = document.getElementById('url-input').value.trim();
            if (!input) return;
            let url = input.includes('.') && !input.includes(' ') ? input : 'https://www.google.com/search?q=' + encodeURIComponent(input);
            if (!url.startsWith('http')) url = 'https://' + url;
            window.location.href = window.__scramjet$config.prefix + window.__scramjet$config.encodeUrl(url);
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            typeLoop();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js', { scope: '/service/' });
            }
        });
    </script>
</body>
</html>
