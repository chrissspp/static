<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statics Web Site | 400 Games</title>
    <style>
        :root {
            --accent: #a020f0; 
            --bg-deep: #050505; 
            --card-bg: #0f0f0f;
            --text: #ffffff;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-deep);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        nav {
            padding: 1.5rem;
            background: #000;
            border-bottom: 3px solid var(--accent);
            text-align: center;
            position: sticky; top: 0; z-index: 100;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            letter-spacing: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .game-card {
            background: var(--card-bg);
            border: 2px solid #222;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transform: scale(1.03);
        }

        .play-btn {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 10px 20px;
            margin-top: 15px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* The Game Theater Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        iframe {
            border: 3px solid var(--accent);
            box-shadow: 0 0 30px var(--accent);
            background: #000;
            max-width: 95%;
            max-height: 80%;
        }

        .close-btn {
            margin-top: 20px;
            color: #ff0055;
            border: 1px solid #ff0055;
            padding: 10px 30px;
            background: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav><div class="logo">STATICS</div></nav>

    <div class="grid" id="gameGrid">
        </div>

    <div id="gameOverlay" class="overlay">
        <div id="gameContainer" style="width: 100%; display: flex; justify-content: center;">
            </div>
        <button class="close-btn" onclick="closeGame()">TERMINATE SESSION</button>
    </div>

    <script>
        // --- 1. YOUR GAME DATABASE ---
        // To add more games, just add a new line here!
        const games = [
            {
                name: "NEON SNAKE",
                icon: "🐍",
                url: "INTERNAL_SNAKE" // We'll keep your custom snake as a special case
            },
            {
                name: "GDS GAME 1",
                icon: "🎮",
                url: "https://html5.gamedistribution.com/f312653358ec4c959a68e43bef2b72c6/"
            }
            // You can add 398 more here!
        ];

        const grid = document.getElementById('gameGrid');
        const overlay = document.getElementById('gameOverlay');
        const container = document.getElementById('gameContainer');

        // --- 2. GENERATE THE CARDS ---
        function loadGrid() {
            grid.innerHTML = "";
            games.forEach((game, index) => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.onclick = () => openGame(game.url);
                card.innerHTML = `
                    <div style="font-size: 3.5rem;">${game.icon}</div>
                    <h3>${game.name}</h3>
                    <button class="play-btn">INITIALIZE</button>
                `;
                grid.appendChild(card);
            });

            // Fill up the rest of the 400 slots with "Encrypted" boxes
            for(let i = games.length + 1; i <= 400; i++) {
                const lock = document.createElement('div');
                lock.className = 'game-card';
                lock.style.opacity = "0.3";
                lock.innerHTML = `<div>🔒</div><h3>SLOT ${i}</h3><p>ENCRYPTED</p>`;
                grid.appendChild(lock);
            }
        }

        // --- 3. OPEN THE GAME ---
        function openGame(url) {
            overlay.style.display = 'flex';
            if(url === "INTERNAL_SNAKE") {
                // You could link to a separate snake.html or keep the code here
                container.innerHTML = `<h1 style="color:white">SNAKE CODE GOES HERE</h1>`;
            } else {
                container.innerHTML = `
                    <iframe src="${url}" width="900" height="600" frameborder="0" scrolling="none"></iframe>
                `;
            }
        }

        function closeGame() {
            overlay.style.display = 'none';
            container.innerHTML = ''; // Stops the game music when you close it
        }

        loadGrid();
    </script>
</body>
</html>
