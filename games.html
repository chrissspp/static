<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Static | Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; display: flex; background: #050505; color: white; font-family: 'Inter', sans-serif; height: 100vh; }
        .sidebar { width: 80px; background: rgba(15, 15, 20, 0.9); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 40px; }
        .sidebar i { font-size: 1.8rem; color: rgba(255, 255, 255, 0.5); cursor: pointer; transition: 0.3s; }
        .sidebar i:hover, .active { color: #7c3aed; }
        .content { flex-grow: 1; padding: 50px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #7c3aed; box-shadow: 0 0 20px rgba(124, 58, 237, 0.2); }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fa-solid fa-house" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad active" onclick="location.href='games.html'"></i>
        <i class="fa-solid fa-gear"></i>
    </div>
    <div class="content">
        <h1>Games</h1>
        <div class="grid">
            <div class="card" onclick="alert('Launching Game...')">
                <img src="./imgs/duck.webp">
                <h3>Sample Game</h3>
            </div>
        </div>
    </div>
</body>
</html>
