<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Static | Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; display: flex; background: #050505; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { width: 80px; background: rgba(15, 15, 20, 0.9); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 40px; }
        .sidebar i { font-size: 1.8rem; color: rgba(255, 255, 255, 0.5); cursor: pointer; transition: 0.3s; }
        .sidebar i:hover, .active { color: #7c3aed; }
        .main { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #1e1b4b 0%, #050505 100%); }
        h1 { font-size: 5rem; margin: 0; background: linear-gradient(to right, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search { margin-top: 30px; width: 500px; padding: 15px 25px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); color: white; outline: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <i class="fa-solid fa-house active" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad" onclick="location.href='games.html'"></i>
        <i class="fa-solid fa-gear"></i>
    </div>
    <div class="main">
        <h1>Static</h1>
        <input type="text" class="search" placeholder="Search Google or type a URL...">
    </div>
</body>
</html>
