<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static | Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --accent-purple: #7c3aed;
            --accent-pink: #d946ef;
            --sidebar-bg: rgba(15, 15, 20, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #050505 100%);
            color: white;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 80px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
            gap: 40px;
            z-index: 100;
        }

        .sidebar i {
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar i:hover, .sidebar i.active {
            color: var(--accent-purple);
            text-shadow: 0 0 15px var(--accent-purple);
            transform: scale(1.1);
        }

        /* Main Dashboard Content */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
        }

        .stars-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            pointer-events: none;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to right, #ffffff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(124, 58, 237, 0.3));
        }

        .tagline {
            font-size: 1.1rem;
            margin-top: 10px;
            opacity: 0.7;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Search / Proxy Bar */
        .search-container {
            margin-top: 50px;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 18px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.4s;
        }

        .search-container input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .launch-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink));
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }

        .launch-btn:hover {
            box-shadow: 0 0 15px var(--accent-pink);
            transform: translateY(-50%) scale(1.05);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <i class="fa-solid fa-house active" onclick="location.href='index.html'"></i>
        <i class="fa-solid fa-gamepad" onclick="location.href='games.html'"></i>
        <i class="fa-solid fa-compass"></i>
        <i class="fa-solid fa-gear"></i>
    </div>

    <div class="main-content">
        <div class="stars-overlay"></div>
        
        <h1>Static</h1>
        <div class="tagline">Start your unblocking journey today</div>

        <div class="search-container">
            <input type="text" id="url-input" placeholder="Search Google or type a URL...">
            <button class="launch-btn" onclick="processUrl()">GET STARTED</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@latest/dist/scramjet.codecs.js"></script>
    <script>
        // 1. Scramjet Configuration
        window.__scramjet$config = {
            prefix: '/service/',
            codec: 'xor',
            encodeUrl: (str) => {
                if (!str) return str;
                return encodeURIComponent(str.split('').map((char, i) => i % 2 ? String.fromCharCode(char.charCodeAt(0) ^ 2) : char).join(''));
            }
        };

        // 2. Register Service Worker to stop "Receiving end does not exist" errors
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js', { scope: '/service/' })
                .then(() => console.log("Proxy Engine Ready"))
                .catch(err => console.error("Engine Error:", err));
        }

        // 3. URL Processing Logic
        function processUrl() {
            const input = document.getElementById('url-input').value.trim();
            if (!input) return;

            let url = input;
            if (!url.includes('.') || url.includes(' ')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }

            // Encode and Redirect through the proxy
            const encoded = window.__scramjet$config.prefix + window.__scramjet$config.encodeUrl(url);
            window.location.href = encoded;
        }

        // Allow "Enter" key to search
        document.getElementById('url-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processUrl();
        });
    </script>
</body>
</html>
